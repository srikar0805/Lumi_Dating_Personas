<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="lumi-bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B7E5DC"/>
      <stop offset="55%" stop-color="#F8C8D5"/>
      <stop offset="100%" stop-color="#D4C5E8"/>
    </linearGradient>
    <linearGradient id="lumi-heart" x1="20" y1="20" x2="80" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB39A"/>
      <stop offset="55%" stop-color="#FF8B7E"/>
      <stop offset="100%" stop-color="#FB5E8E"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#lumi-bg)"/>
  <!-- Pixel-style heart: built from rectangular pixels -->
  <g fill="url(#lumi-heart)">
    <rect x="22" y="28" width="10" height="6"/>
    <rect x="32" y="22" width="16" height="6"/>
    <rect x="48" y="28" width="4" height="6"/>
    <rect x="52" y="22" width="16" height="6"/>
    <rect x="68" y="28" width="10" height="6"/>
    <rect x="16" y="34" width="68" height="12"/>
    <rect x="22" y="46" width="56" height="10"/>
    <rect x="28" y="56" width="44" height="8"/>
    <rect x="34" y="64" width="32" height="8"/>
    <rect x="40" y="72" width="20" height="6"/>
    <rect x="46" y="78" width="8" height="4"/>
  </g>
  <!-- Pixel highlight on heart -->
  <g fill="#FFFFFF">
    <rect x="32" y="34" width="6" height="6" opacity="0.95"/>
    <rect x="38" y="34" width="4" height="4" opacity="0.7"/>
  </g>
  <!-- Sparkles & decorative shapes -->
  <g>
    <!-- top-left small heart -->
    <path d="M14 58 l-3 -3 a2 2 0 0 1 3 -3 a2 2 0 0 1 3 3 z" fill="#FF9FB3" opacity="0.9"/>
    <!-- top-right plus -->
    <path d="M84 30 h4 v-2 h-4 v-4 h-2 v4 h-4 v2 h4 v4 h2 z" fill="#7FE5D5" opacity="0.95"/>
    <!-- bottom-right diamond -->
    <path d="M84 70 l4 4 -4 4 -4 -4 z" fill="#7FE5D5" opacity="0.85"/>
    <!-- triangle -->
    <path d="M16 80 l5 -8 5 8 z" fill="#FFB39A" opacity="0.9"/>
    <!-- sparkles -->
    <circle cx="80" cy="14" r="1.6" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="20" cy="20" r="1.4" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="74" cy="86" r="1.2" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="46" cy="14" r="1" fill="#FFFFFF" opacity="0.8"/>
  </g>
</svg>
